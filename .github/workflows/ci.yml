name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Strict typing and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy mushy_peas tests

      - name: Run pyright
        run: uv run pyright

      - name: Run pytest
        run: uv run pytest
